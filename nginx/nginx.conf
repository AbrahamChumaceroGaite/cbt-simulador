events {
  worker_connections 1024;
}

http {
  gzip            on;
  gzip_types      text/plain text/css application/json application/javascript text/xml application/xml;
  server_tokens   off;

  upstream nestjs_api {
    server api:4002;
  }

  upstream nextjs_web {
    server web:3002;
  }

  server {
    listen 80;
    server_name _;

    add_header X-Frame-Options        "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection       "1; mode=block";
    add_header Referrer-Policy        "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'";

    # NestJS API — all /api/* requests go directly to the backend
    location /api/ {
      proxy_pass         http://nestjs_api;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # Next.js static assets — long cache
    location /_next/static/ {
      proxy_pass       http://nextjs_web;
      proxy_set_header Host $host;
      expires          1y;
      add_header       Cache-Control "public, immutable";
    }

    # Everything else → Next.js frontend
    location / {
      proxy_pass         http://nextjs_web;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
    }
  }
}
