services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    expose:
      - "4002"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/prod.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - PORT=4002
      - WEB_ORIGIN=${WEB_ORIGIN:-http://localhost:3002}
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        - API_URL=http://api:4002
    ports:
      - "${WEB_PORT:-3002}:3002"
    environment:
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite_data:
